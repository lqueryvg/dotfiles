[allowlist]
  description = "Allowlist for dotfiles repo"

  # 1Password secret references — not real secrets, just pointers
  regexes = [
    '''op://[a-zA-Z0-9\-]+/[a-zA-Z0-9\-]+/[a-zA-Z0-9\-]+''',
  ]

  # UUIDs (commonly flagged as high-entropy strings)
  [[allowlist.regexes]]
    description = "UUIDs"
    regex = '''[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'''

  # Brewfile hash comments generated by chezmoi
  [[allowlist.regexes]]
    description = "Brewfile SHA256 hash comments"
    regex = '''# Brewfile hash: [0-9a-f]{64}'''
