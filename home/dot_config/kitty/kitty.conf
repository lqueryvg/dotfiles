# kitty config
# Full reference: https://sw.kovidgoyal.net/kitty/conf/

# Copy selection to system clipboard automatically
font_family      MesloLGS NF Regular
bold_font        MesloLGS NF Bold
italic_font      MesloLGS NF Italic
bold_italic_font MesloLGS NF Bold Italic
font_size        12.0

copy_on_select clipboard
focus_follows_mouse yes

# Word selection characters — non-alphanumeric chars treated as part of a word.
# Excludes / and . so that double-clicking "fred" in "./tmp/fred" selects only "fred".
select_by_word_characters @-_~?&=%+#


# Open new window in current directory
map cmd+n new_os_window_with_cwd

# BEGIN_KITTY_THEME
# Monokai
include current-theme.conf
# END_KITTY_THEME