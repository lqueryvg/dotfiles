name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  apply:
    name: chezmoi apply (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Install zsh (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y zsh

      - name: Configure chezmoi
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          cat > "$HOME/.config/chezmoi/chezmoi.toml" <<'EOF'
          [data]
            name           = "CI User"
            gitEmail       = "ci@example.com"
            is_ci_workflow = true
          EOF

      - name: Link repo as chezmoi source
        run: |
          mkdir -p "$HOME/.local/share"
          ln -s "$GITHUB_WORKSPACE" "$HOME/.local/share/chezmoi"

      - name: Apply dotfiles
        run: $HOME/.local/bin/chezmoi apply --verbose

      - name: Test shell
        run: zsh -i scripts/test-shell.sh

      - name: Startup benchmark (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install hyperfine
          hyperfine --warmup 3 --runs 10 'zsh -i -c exit' --export-json /tmp/bench.json
          ms=$(python3 -c "import json; r=json.load(open('/tmp/bench.json'))['results'][0]; print(f\"{r['mean']*1000:.0f}ms mean, {r['max']*1000:.0f}ms max\")")
          echo "Shell startup: $ms"
